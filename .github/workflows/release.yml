name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  compile-check:
    uses: ./.github/workflows/compile-check.yml

  release:
    name: Create Release
    needs: compile-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Package library
        run: |
          mkdir -p /tmp/pkg/debug-helper
          cp -r src examples library.properties library.json keywords.txt README.md LICENSE /tmp/pkg/debug-helper/
          cd /tmp/pkg && zip -r "$GITHUB_WORKSPACE/debug-helper-${GITHUB_REF_NAME}.zip" debug-helper/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "debug-helper ${{ github.ref_name }}" \
            --generate-notes \
            "debug-helper-${{ github.ref_name }}.zip"
